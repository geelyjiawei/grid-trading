name: Tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.12"
          - "3.13"

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: python -m pip install --requirement requirements.txt

      - name: Run test suite
        env:
          PYTHONHASHSEED: "776531419"
        run: python -m unittest discover --start-directory tests --pattern "test_*.py"

      - name: Compile Python sources
        run: python -m compileall -q backend tests

      - name: Check frontend syntax
        if: matrix.python-version == '3.12'
        run: node --check frontend/app.js

      - name: Verify compatibility contract
        if: matrix.python-version == '3.12'
        env:
          PYTHONPATH: backend
        run: |
          python contracts/export_contract.py
          git diff --exit-code -- contracts/openapi-v1.json contracts/frontend-api-v1.json

  rust:
    name: Rust backend
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install stable Rust
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt --component clippy --no-self-update
          rustup default stable

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint Rust
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test Rust
        run: cargo test --workspace --all-targets

  vue:
    name: Vue frontend
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: vue-frontend/package-lock.json

      - name: Install locked dependencies
        working-directory: vue-frontend
        run: npm ci

      - name: Audit dependencies
        working-directory: vue-frontend
        run: npm audit --audit-level=high

      - name: Test Vue
        working-directory: vue-frontend
        run: npm test

      - name: Type-check Vue
        working-directory: vue-frontend
        run: npm run typecheck

      - name: Build Vue
        working-directory: vue-frontend
        run: npm run build
