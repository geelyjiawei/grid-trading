services:
  grid-trading:
    build: .
    container_name: grid-trading
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TZ: Asia/Shanghai
      GRID_CONFIG_FILE: /app/data/api_config.json
      GRID_STATE_FILE: /app/data/grid_state.json
      GRID_HISTORY_FILE: /app/data/grid_history.json
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
